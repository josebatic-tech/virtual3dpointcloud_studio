<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Depth Point Cloud</title>
  <link rel="stylesheet" href="style.css"/>
  <script type="importmap">
  {
    "imports": {
      "three": "./node_modules/three/build/three.module.js",
      "@huggingface/transformers": "./node_modules/@huggingface/transformers/dist/transformers.js"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Depth<span> / </span>Cloud</div>
    <div id="status">waiting…</div>
  </header>

  <main>
    <aside id="sidebar">
      <nav id="tab-bar">
        <button class="tab-btn active" data-tab="camera" title="Camera">🎥</button>
        <button class="tab-btn" data-tab="pointcloud" title="Point Cloud">☁️</button>
        <button class="tab-btn" data-tab="aesthetics" title="Aesthetics">🎨</button>
      </nav>

      <div id="tab-panels">
        <!-- 🎥 CAMERA TAB -->
        <div class="tab-panel active" id="tab-camera">
          <div class="sidebar-section">
            <div class="sidebar-section-title">Camera Controls</div>
            <div id="cam-controls">
              <button id="btnStart">▶ Start</button>
              <button id="btnDepth" disabled>◈ Depth</button>
              <button id="btnStop" disabled>■ Stop</button>
            </div>
            <div class="param-row" id="deviceSelectorRow" style="display:none;">
              <label>Device</label>
              <select id="cameraDevice" style="flex:1;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:9px;padding:4px 6px;border-radius:var(--radius);outline:none;">
                <option value="">— select camera —</option>
              </select>
            </div>
            <div class="param-row" id="zedRow" style="display:none;">
              <label>Zed 2</label>
              <button id="btnZedConnect" class="btn-flex">⬡ Connect</button>
            </div>
            <div class="param-row">
              <label>Resolution</label>
              <select id="cameraResolution" style="flex:1;background:transparent;border:1px solid var(--border2);color:var(--text);font-family:var(--font-mono);font-size:9px;padding:4px 6px;border-radius:var(--radius);outline:none;">
                <option value="360p">360p (480×360)</option>
                <option value="480p">480p (640×480)</option>
                <option value="720p" selected>720p (1280×720)</option>
                <option value="1080p">1080p (1920×1080)</option>
              </select>
            </div>
            <div class="toggle-row">
              <span class="toggle-label">View</span>
              <div style="display:flex; gap:4px; flex:1;">
                <button id="btnViewPointCloud" class="view-btn active" style="flex:1;">3D Cloud</button>
                <button id="btnViewCamera" class="view-btn" style="flex:1;">Camera</button>
              </div>
            </div>
            <div style="margin-top:8px;">
              <button id="btnFullscreen" style="width:100%;">⛶ Fullscreen (F or ⏺)</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-title">Previews</div>
            <div class="preview-panel" id="previewWebcam">
              <span class="plabel">webcam</span>
              <video id="video" autoplay muted playsinline></video>
            </div>
            <div class="preview-panel" id="previewDepth">
              <span class="plabel">depth</span>
              <canvas id="depthCanvas"></canvas>
            </div>
            <div style="display:flex; gap:6px; margin-top:8px;">
              <label class="toggle">
                <input type="checkbox" id="togWebcam" checked data-preview="previewWebcam"/>
                <span class="toggle-slider"></span>
              </label>
              <label class="toggle">
                <input type="checkbox" id="togDepthMap" checked data-preview="previewDepth"/>
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- ☁️ POINT CLOUD TAB -->
        <div class="tab-panel" id="tab-pointcloud">
          <div class="sidebar-section">
            <div class="sidebar-section-title">Point Cloud</div>
            <div class="param-row">
              <label>Mode</label>
              <button id="btnMeshMode" class="btn-flex">☁ Cloud</button>
            </div>
            <div class="param-row">
              <label>Pt Size</label>
              <input type="range" id="ptSize" min="1" max="8" step="1" value="2"/>
              <span class="val" id="ptSizeVal">2</span>
            </div>
            <div class="param-row">
              <label>Density</label>
              <input type="range" id="density" min="2" max="12" step="1" value="2"/>
              <span class="val" id="densityVal">2</span>
            </div>
            <div class="param-row">
              <label>Depth</label>
              <input type="range" id="depthScale" min=".5" max="5" step=".1" value="2"/>
              <span class="val" id="depthScaleVal">2.0</span>
            </div>
            <div class="param-row mt-6">
              <label>Auto-rot</label>
              <button id="btnRotate" class="btn-flex">↻ Off</button>
            </div>
            <div class="toggle-row mt-6">
              <span class="toggle-label">Person Only</span>
              <label class="toggle">
                <input type="checkbox" id="togPersonOnly"/>
                <span class="toggle-slider"></span>
              </label>
            </div>
            <div id="mattingStatus" class="sam-status"></div>
          </div>
        </div>

        <!-- 🎨 AESTHETICS TAB -->
        <div class="tab-panel" id="tab-aesthetics">
          <div class="sidebar-section">
            <div class="sidebar-section-title">Director</div>
            <div class="param-row">
              <label>Speed</label>
              <input type="range" id="camSpeed" min="0.01" max="0.3" step="0.01" value="0.08"/>
              <span class="val" id="camSpeedVal">0.08</span>
            </div>
            <div class="param-row">
              <label>Lens</label>
              <input type="range" id="lensFocus" min="20" max="100" step="5" value="55"/>
              <span class="val" id="lensFocusVal">55</span>
            </div>
            <div style="display:flex; gap:4px; margin-top:8px;">
              <button id="btnCamLeft" class="preset-btn" style="flex:1;">⬅ -45°</button>
              <button id="btnCamRight" class="preset-btn" style="flex:1;">➡ +45°</button>
            </div>
            <div style="display:flex; gap:4px; margin-top:12px; flex-wrap:wrap;">
              <button id="btnBgGreen" class="preset-btn" style="flex:1; background:#1a5f3f !important; border-color:#1a5f3f !important; color:#fff !important;">🟢</button>
              <button id="btnBgBlue" class="preset-btn" style="flex:1; background:#0d3b66 !important; border-color:#0d3b66 !important; color:#fff !important;">🔵</button>
              <button id="btnBgRed" class="preset-btn" style="flex:1; background:#6b1a23 !important; border-color:#6b1a23 !important; color:#fff !important;">🔴</button>
              <button id="btnBgYellow" class="preset-btn" style="flex:1; background:#8b7b2f !important; border-color:#8b7b2f !important; color:#fff !important;">🟡</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-title">Lighting</div>
            <div class="param-row">
              <label>Intensity</label>
              <input type="range" id="lightIntensity" min="0.1" max="3" step="0.1" value="1"/>
              <span class="val" id="lightIntensityVal">1.0</span>
            </div>
            <div class="param-row">
              <label>Ambient</label>
              <input type="range" id="lightAmbience" min="0" max="1" step="0.1" value="0.5"/>
              <span class="val" id="lightAmbienceVal">0.5</span>
            </div>
            <div class="param-row">
              <label>Color</label>
              <input type="color" id="lightColor" value="#ffffff" style="width:100%;height:32px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;"/>
            </div>
            <div class="param-row mt-6">
              <label>Interactive</label>
              <button id="btnInteractiveLight" class="btn-flex">💡 Off</button>
            </div>
          </div>

          <div class="sidebar-section">
            <div class="sidebar-section-title">Effects</div>
            <div style="display:flex; gap:4px; margin-bottom:8px;">
              <button id="btnParticleRain" class="preset-btn" style="flex:1;">🌧 Rain</button>
              <button id="btnParticleSnow" class="preset-btn" style="flex:1;">❄ Snow</button>
              <button id="btnParticleWind" class="preset-btn" style="flex:1;">💨 Wind</button>
            </div>
            <div class="param-row">
              <label>Count</label>
              <input type="range" id="particleCount" min="100" max="5000" step="100" value="2000"/>
              <span class="val" id="particleCountVal">2000</span>
            </div>
            <div class="param-row">
              <label>Opacity</label>
              <input type="range" id="particleOpacity" min="0" max="1" step="0.1" value="0.6"/>
              <span class="val" id="particleOpacityVal">0.6</span>
            </div>
          </div>
        </div>


      </div>
    </aside>

    <div id="viewport">
      <canvas id="pcCanvas"></canvas>
      <div id="cameraViewContainer" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:#000;overflow:hidden;">
        <video id="cameraViewVideo" autoplay muted playsinline style="width:100%;height:100%;object-fit:contain;"></video>
      </div>
      <div id="lightDot"></div>
      <div id="crosshair"></div>
      <div id="fpsCounter" style="position:absolute;top:8px;right:8px;font-family:var(--font-mono);font-size:10px;color:#9fb3c8;background:rgba(8,10,14,0.6);padding:2px 6px;border-radius:4px;pointer-events:none;"></div>
    </div>

  </main>

  <footer>
    <span class="footer-tag">Depth Anything Small · <span>transformers.js</span></span>
    <span class="footer-tag">Three.js · <span>WebGL</span></span>
    <span class="footer-tag">Drag <span>rotate</span> · Scroll <span>zoom</span></span>
  </footer>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
